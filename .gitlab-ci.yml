# Dostosuj gałąź w workflow.rules, jeśli używasz innej niż main
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

variables:
  # bookworm = pełny glibc (native moduły Tailwind / Vite na Linux działają stabilnie)
  NODE_IMAGE: node:22-bookworm
  NPM_CONFIG_CACHE: $CI_PROJECT_DIR/.npm
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"

stages:
  - test

.web_cache: &web_cache
  cache:
    key:
      files:
        - apps/web/package-lock.json
    paths:
      - .npm/

.api_cache: &api_cache
  cache:
    key:
      files:
        - apps/api/package-lock.json
    paths:
      - .npm/

web:build:
  image: $NODE_IMAGE
  stage: test
  <<: *web_cache
  script:
    - cd apps/web
    # npm ci bywa z błędem na opcjonalnych @rolldown/* (Vite 8 / Linux); npm install respektuje lockfile
    - npm install -g npm@11
    - npm install
    - npm run build

api:test:
  image: $NODE_IMAGE
  stage: test
  <<: *api_cache
  script:
    - cd apps/api
    - npm ci
    - npm run build
    - npm run test
